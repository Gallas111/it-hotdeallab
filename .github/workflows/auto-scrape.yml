name: 핫딜 자동 수집

on:
  schedule:
    - cron: '0 */2 * * *'   # 매 2시간마다 자동 실행 (UTC 기준, 한국 기준 2시간마다)
  workflow_dispatch:          # GitHub에서 수동 실행 버튼 제공

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: IT 핫딜 자동 수집
        run: |
          echo "🔄 수집 시작: $(date -u '+%Y-%m-%d %H:%M UTC')"
          response=$(curl -s -o /tmp/scrape_result.json -w "%{http_code}" \
            --max-time 120 \
            "https://ithotdealab.com/api/cron/scrape")
          echo "HTTP Status: $response"
          cat /tmp/scrape_result.json
          if [ "$response" != "200" ]; then
            echo "❌ 수집 실패 (status: $response)"
            exit 1
          fi
          echo "✅ 수집 완료"
